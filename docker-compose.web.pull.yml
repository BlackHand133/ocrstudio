# OCR Studio — Web (prebuilt image, no local build)
#
#   docker compose -f docker-compose.web.pull.yml up -d
#   open http://localhost:8000
#
# Pulls the published CPU image from GHCR instead of building paddle wheels
# locally. Copy .env.example -> .env first to set the port / optional login.
# Data lives in the mounted host folders below and survives restarts.

services:
  web:
    image: ghcr.io/blackhand133/ocrstudio:latest
    container_name: ocrstudio-web
    pull_policy: always
    ports:
      # Host port configurable: WEB_PORT=8088 docker compose ... up
      - "${WEB_PORT:-8000}:8000"
    environment:
      # Set BOTH to require an HTTP Basic-auth login (leave empty to disable).
      OCR_USER: ${OCR_USER:-}
      OCR_PASS: ${OCR_PASS:-}
      # OCR runtime profile: cpu (default) or gpu.
      OCR_PROFILE: ${OCR_PROFILE:-}
    volumes:
      - ./workspaces:/app/workspaces       # annotation data (persistent)
      - ./models:/app/models               # OCR model weights (persistent)
      - ./data:/app/data                   # app state json
      - ./config:/app/config               # editable YAML config
      - ./output_det:/app/output_det       # exported detection datasets
      - ./output_rec:/app/output_rec       # exported recognition datasets
    restart: unless-stopped
    shm_size: "1g"                         # PaddleOCR likes more shared memory
