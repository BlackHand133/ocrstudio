# OCR Studio — Web (single container)
#
#   docker compose -f docker-compose.web.yml up --build
#   open http://localhost:8000
#
# Data lives in mounted host folders and survives container restarts.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: runtime-web
    image: ocrstudio-web:latest
    container_name: ocrstudio-web
    ports:
      # Host port configurable (avoid clashes): WEB_PORT=8088 docker compose ... up
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - ./workspaces:/app/workspaces       # annotation data (persistent)
      - ./models:/app/models               # OCR model weights (persistent)
      - ./data:/app/data                   # app state json
      - ./config:/app/config               # editable YAML config (settings persist)
      - ./output_det:/app/output_det       # exported detection datasets
      - ./output_rec:/app/output_rec       # exported recognition datasets
      # To annotate an existing host folder without uploading, mount it and
      # create a workspace with that path, e.g.:
      # - ./images:/data/images:ro
    restart: unless-stopped
    shm_size: "1g"                         # PaddleOCR likes more shared memory
