name: Release image

# Build the CPU web image and publish it to GitHub Container Registry (GHCR)
# on every version tag (v*.*.*). Consumers can then `docker pull` / `compose up`
# the prebuilt image instead of building paddle wheels locally.
#
# First publish only: make the package public once in
#   GitHub → repo → Packages → ocrstudio → Package settings → Change visibility
# so anonymous `docker pull` works.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push web image (GHCR, CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # image name is lower-cased automatically (ghcr.io/blackhand133/ocrstudio)
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          target: runtime-web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
