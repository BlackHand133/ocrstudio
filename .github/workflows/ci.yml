name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint the web backend (server/) — black, isort, flake8.
  # Scoped to server/ on purpose: the legacy desktop code under modules/ was
  # never auto-formatted, and mypy is too noisy across the transitive imports.
  # ─────────────────────────────────────────────
  lint:
    name: Lint (web backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install lint dependencies
        run: |
          pip install --upgrade pip
          pip install black isort flake8

      - name: black --check
        run: black --check server/

      - name: isort --check
        run: isort --check-only server/

      - name: flake8
        run: |
          flake8 server/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503

  # ─────────────────────────────────────────────
  # Job 2: Core unit tests (no Qt, no PaddleOCR)
  # ─────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov numpy pyyaml

      - name: Run unit tests (headless, no Qt)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/unit/ \
            -m "not gui and not slow" \
            --tb=short \
            -q \
            --cov=modules/core \
            --cov=modules/utils \
            --cov=modules/config \
            --cov-report=term-missing \
            --cov-fail-under=30

  # ─────────────────────────────────────────────
  # Job 3: Web backend API tests (FastAPI TestClient, no paddle/Qt)
  # ─────────────────────────────────────────────
  backend-api:
    name: Backend API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install lightweight web test dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run web API round-trip tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests/test_api_server.py --tb=short -q

  # ─────────────────────────────────────────────
  # Job 4: Frontend (type-check + build + Vitest)
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend build & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm run test

  # ─────────────────────────────────────────────
  # Job 5: Docker build (CPU web image)
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker build (web, CPU)
    runs-on: ubuntu-latest
    # Only run on push (not every PR) — the paddle wheels make this a heavy build.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CPU web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          target: runtime-web
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ocrstudio-web:cpu-ci
