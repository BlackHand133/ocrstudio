# CPU Profile Configuration
# Optimized for CPU processing without GPU

device:
  type: "cpu"

paddleocr:
  # ===== Basic Settings =====
  lang: "th"                      # Language (uses official PaddleOCR models)
  device: "cpu"

  # ===== Custom Model Paths (uncomment to use) =====
  # text_detection_model_dir: "models/det/custom_det_model"
  # text_recognition_model_dir: "models/rec/custom_rec_model"
  # doc_orientation_classify_model_dir: "models/cls/custom_cls_model"
  # doc_unwarping_model_dir: "models/unwarp/custom_unwarp_model"
  # textline_orientation_model_dir: "models/textline/custom_textline_model"

  # ===== Advanced Features =====
  use_doc_orientation_classify: false
  use_doc_unwarping: false
  use_textline_orientation: true

  # ===== Detection Parameters =====
  det_db_box_thresh: 0.7          # Box threshold (0.1-1.0)
  det_db_unclip_ratio: 1.5        # Unclip ratio (1.0-3.0)
  # text_det_thresh: 0.3          # Pixel threshold
  # text_det_limit_side_len: 960  # Max side length
  # text_det_limit_type: "max"    # Limit type
  # text_detection_batch_size: 1

  # ===== Recognition Parameters =====
  rec_batch_num: 6                # Batch size
  # text_rec_score_thresh: 0.0    # Score threshold

  # ===== CPU Optimization =====
  enable_mkldnn: true             # MKL-DNN acceleration
  mkldnn_cache_capacity: 10
  cpu_threads: 8
